<main id="main-content">

    <section aria-labelledby="todo-heading">

        <h2 id="todo-heading">
            Task Manager
        </h2>

        <form id="task-form">

            <label for="task-input">
                Add New Task
            </label>

            <input
                type="text"
                id="task-input"
                placeholder="Enter a task"
                required>

            <button type="submit">
                Add Task
            </button>

        </form>

        <div class="filter-container">

            <button id="all-btn" type="button">
                All
            </button>

            <button id="active-btn" type="button">
                Active
            </button>

            <button id="completed-btn" type="button">
                Completed
            </button>

        </div>

        <ul id="task-list"></ul>

    </section>

</main>
